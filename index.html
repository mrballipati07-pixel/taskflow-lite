<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Lite</title>

    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/utilities.css">
</head>
<body>

<div class="container">

    <div class="header">
        <h1>📋 TaskFlow Lite</h1>

        <button id="themeBtn">
            🌙 Dark Mode
        </button>
    </div>

    <div class="search-box">
        <input
            type="text"
            id="searchInput"
            placeholder="Search tasks..."
        >
    </div>

    <div class="task-form">

        <input
            type="text"
            id="taskInput"
            placeholder="Enter a task..."
        >

        <input
            type="date"
            id="dueDate"
        >

        <button id="addBtn">
            Add Task
        </button>

    </div>

    <div class="progress-section">

        <div class="progress-container">
            <div id="progressBar"></div>
        </div>

        <p id="progressText">
            0% Completed
        </p>

    </div>

    <div class="filters">

        <button
            class="filter-btn active"
            data-filter="all">
            All
        </button>

        <button
            class="filter-btn"
            data-filter="active">
            Active
        </button>

        <button
            class="filter-btn"
            data-filter="completed">
            Completed
        </button>

    </div>

    <div id="taskCounter">
        Total: 0 | Completed: 0
    </div>

    <ul id="taskList"></ul>

    <p id="emptyState">
        No tasks yet. Add your first task!
    </p>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
